<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل صوت احترافي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px;
        }
        
        .player-container {
            width: 100%;
            max-width: 700px;
            background: linear-gradient(145deg, #14141e, #1a1a2e);
            border-radius: 24px;
            padding: 40px 35px 35px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        
        /* رأس المشغل */
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .player-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .player-title .icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff0055, #ff6b35);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .badge-time {
            font-size: 12px;
            font-weight: 400;
            color: #888;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        /* شريط التقدم */
        .progress-container {
            margin: 10px 0 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s;
        }
        
        .progress-bar:hover {
            height: 8px;
        }
        
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0055, #ff6b35);
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
            transition: transform 0.2s;
        }
        
        .progress-bar::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        
        .progress-bar::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0055, #ff6b35);
            cursor: pointer;
            border: none;
        }
        
        .time-labels {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            margin-top: 8px;
        }
        
        .time-labels .current {
            color: #aaa;
        }
        
        .time-labels .end {
            color: #555;
        }
        
        /* أزرار التحكم الرئيسية */
        .controls-main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0 25px;
        }
        
        .controls-main button {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .controls-main button:hover {
            color: #fff;
            transform: scale(1.05);
        }
        
        .controls-main button:active {
            transform: scale(0.92);
        }
        
        .controls-main button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-play {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #ff0055, #ff6b35);
            border-radius: 50% !important;
            color: #fff !important;
            font-size: 28px;
            box-shadow: 0 8px 35px rgba(255, 0, 85, 0.3);
            transition: all 0.3s ease !important;
        }
        
        .btn-play:hover {
            transform: scale(1.06) !important;
            box-shadow: 0 10px 45px rgba(255, 0, 85, 0.4);
        }
        
        .btn-play:active {
            transform: scale(0.94) !important;
        }
        
        .btn-play.paused {
            background: linear-gradient(135deg, #2a2a3e, #3a3a5e);
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.3);
        }
        
        .btn-play.paused:hover {
            box-shadow: 0 8px 35px rgba(255, 255, 255, 0.05);
        }
        
        .btn-skip {
            font-size: 22px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.25s ease;
        }
        
        .btn-skip:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        /* شريط التحكم السفلي */
        .controls-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .controls-bottom .time-display {
            color: #888;
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            min-width: 120px;
        }
        
        .controls-bottom .time-display .highlight {
            color: #fff;
        }
        
        .controls-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .controls-right button {
            background: none;
            border: none;
            color: #777;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.25s ease;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .controls-right button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }
        
        .controls-right button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .controls-right .volume-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .controls-right .volume-wrap input[type="range"] {
            width: 70px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        
        .controls-right .volume-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff0055;
            cursor: pointer;
        }
        
        .controls-right .volume-wrap input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff0055;
            cursor: pointer;
            border: none;
        }
        
        .controls-right .volume-wrap input[type="range"]:disabled {
            opacity: 0.3;
        }
        
        /* رسالة الخطأ */
        .error-message {
            color: #ff4444;
            text-align: center;
            padding: 15px;
            background: rgba(255, 68, 68, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 68, 68, 0.15);
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        
        /* حالة التحميل */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #666;
            font-size: 14px;
            padding: 10px 0;
        }
        
        .loading-state .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-top: 2px solid #ff0055;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        /* استجابة للجوال */
        @media (max-width: 600px) {
            .player-container {
                padding: 25px 20px;
                border-radius: 18px;
            }
            
            .player-title {
                font-size: 15px;
            }
            
            .player-title .icon {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
            
            .controls-main {
                gap: 12px;
                margin: 15px 0 20px;
            }
            
            .btn-play {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            
            .btn-skip {
                font-size: 18px;
                width: 40px;
                height: 40px;
            }
            
            .controls-bottom {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
            
            .controls-right {
                justify-content: space-between;
            }
            
            .controls-right .volume-wrap input[type="range"] {
                width: 80px;
            }
            
            .badge-time {
                font-size: 10px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="player-container" id="playerContainer">
        <!-- رأس المشغل -->
        <div class="player-header">
            <div class="player-title">
                <span class="icon">🎵</span>
                <span>مشغل الصوت</span>
            </div>
            <div class="badge-time" id="badgeTime">⏱️ تشغيل مباشر</div>
        </div>
        
        <!-- شريط التقدم -->
        <div class="progress-container">
            <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0">
            <div class="time-labels">
                <span class="current" id="currentTimeLabel">00:00</span>
                <span class="end" id="endTimeLabel">--:--</span>
            </div>
        </div>
        
        <!-- أزرار التحكم الرئيسية -->
        <div class="controls-main">
            <button id="rewindBtn" class="btn-skip" title="رجوع 10 ثواني" disabled>⏪</button>
            <button id="playBtn" class="btn-play" title="تشغيل/إيقاف" disabled>▶</button>
            <button id="forwardBtn" class="btn-skip" title="تقديم 10 ثواني" disabled>⏩</button>
        </div>
        
        <!-- شريط التحكم السفلي -->
        <div class="controls-bottom">
            <div class="time-display">
                <span id="timeDisplay"><span class="highlight">00:00</span> / 00:00</span>
            </div>
            
            <div class="controls-right">
                <button id="muteBtn" title="كتم الصوت" disabled>🔊</button>
                <div class="volume-wrap">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" disabled>
                </div>
                <button id="fullscreenBtn" title="ملء الشاشة" disabled>⛶</button>
            </div>
        </div>
        
        <!-- حالة التحميل -->
        <div class="loading-state" id="loadingIndicator">
            <div class="spinner"></div>
            <span>جاري تحميل الصوت...</span>
        </div>
        
        <!-- رسالة الخطأ -->
        <div class="error-message" id="errorMessage">
            ⚠️ حدث خطأ في تحميل الفيديو. يرجى المحاولة مرة أخرى.
        </div>
    </div>

    <!-- حاوية مشغل YouTube المخفية -->
    <div id="youtubePlayer" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></div>

    <script>
        // --- قراءة المعاملات ---
        const params = new URLSearchParams(window.location.search);
        let videoId = params.get('v') || params.get('url') || '7NyQQOS9vrI';
        
        const match = videoId.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
        if (match) videoId = match[1];
        
        let startTime = parseInt(params.get('t')) || parseInt(params.get('start')) || 0;
        let endTime = parseInt(params.get('end')) || 0;
        if (isNaN(startTime)) startTime = 0;
        if (isNaN(endTime)) endTime = 0;
        if (endTime > 0 && endTime <= startTime) endTime = 0;
        
        // --- متغيرات المشغل ---
        let player = null;
        let isPlaying = false;
        let isMuted = false;
        let isDragging = false;
        let volumeBeforeMute = 1;
        let playerReady = false;
        let timeInterval = null;
        let progressInterval = null;
        
        // --- عناصر DOM ---
        const playBtn = document.getElementById('playBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const muteBtn = document.getElementById('muteBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const currentTimeLabel = document.getElementById('currentTimeLabel');
        const endTimeLabel = document.getElementById('endTimeLabel');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');
        const badgeTime = document.getElementById('badgeTime');
        const container = document.getElementById('playerContainer');
        
        // --- دوال مساعدة ---
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds) || seconds < 0) return '00:00';
            seconds = Math.floor(seconds);
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }
        
        function enableControls(enabled) {
            const btns = [playBtn, rewindBtn, forwardBtn, muteBtn, fullscreenBtn];
            btns.forEach(btn => btn.disabled = !enabled);
            volumeSlider.disabled = !enabled;
            if (enabled) {
                progressBar.style.cursor = 'pointer';
            } else {
                progressBar.style.cursor = 'default';
            }
        }
        
        function showError(msg) {
            errorMessage.textContent = '⚠️ ' + msg;
            errorMessage.style.display = 'block';
            loadingIndicator.classList.add('hidden');
        }
        
        function hideError() {
            errorMessage.style.display = 'none';
        }
        
        // --- تهيئة المشغل ---
        function initPlayer() {
            // تحميل API يوتيوب
            if (window.YT && window.YT.Player) {
                createPlayer();
                return;
            }
            
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            
            window.onYouTubeIframeAPIReady = createPlayer;
        }
        
        function createPlayer() {
            player = new YT.Player('youtubePlayer', {
                height: '1',
                width: '1',
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                    iv_load_policy: 3,
                    playsinline: 1,
                    start: startTime,
                    enablejsapi: 1,
                    origin: window.location.origin
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onError: onPlayerError
                }
            });
        }
        
        function onPlayerReady(event) {
            playerReady = true;
            enableControls(true);
            loadingIndicator.classList.add('hidden');
            hideError();
            
            // عرض التوقيت
            if (startTime > 0) {
                badgeTime.textContent = '▶️ يبدأ من ' + formatTime(startTime);
                badgeTime.style.color = '#44ff88';
            }
            if (endTime > 0) {
                badgeTime.textContent += ' ⏹️ ينتهي عند ' + formatTime(endTime);
                badgeTime.style.color = '#ff8844';
                endTimeLabel.textContent = formatTime(endTime);
            }
            if (startTime === 0 && endTime === 0) {
                badgeTime.textContent = '🎵 تشغيل مباشر';
                badgeTime.style.color = '#888';
            }
            
            // بدء التشغيل
            if (startTime > 0) {
                event.target.seekTo(startTime, true);
            }
            event.target.playVideo();
            isPlaying = true;
            playBtn.textContent = '⏸';
            playBtn.classList.remove('paused');
            
            // تحديث الوقت
            if (timeInterval) clearInterval(timeInterval);
            if (progressInterval) clearInterval(progressInterval);
            timeInterval = setInterval(updateTime, 500);
            progressInterval = setInterval(updateProgressBar, 1000);
            
            updateTime();
            updateProgressBar();
        }
        
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                playBtn.textContent = '⏸';
                playBtn.classList.remove('paused');
                isPlaying = true;
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                playBtn.textContent = '▶';
                playBtn.classList.add('paused');
                isPlaying = false;
            }
            
            // التحقق من وقت النهاية
            if (endTime > 0 && player && player.getCurrentTime) {
                const current = player.getCurrentTime();
                if (current >= endTime) {
                    player.pauseVideo();
                    playBtn.textContent = '▶';
                    playBtn.classList.add('paused');
                    isPlaying = false;
                    timeDisplay.innerHTML = '<span style="color:#ff8844;">⏹️ انتهى المقطع</span>';
                }
            }
        }
        
        function onPlayerError(event) {
            console.error('خطأ في المشغل:', event.data);
            let msg = 'فشل تحميل الفيديو';
            if (event.data === 2) msg = 'معرف الفيديو غير صحيح';
            else if (event.data === 100) msg = 'الفيديو غير متاح في بلدك';
            else if (event.data === 150) msg = 'الفيديو خاص أو محظور';
            showError(msg);
            enableControls(false);
            loadingIndicator.classList.add('hidden');
        }
        
        function updateTime() {
            if (!playerReady || !player || !player.getCurrentTime) return;
            try {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                
                if (endTime > 0 && current >= endTime) {
                    player.pauseVideo();
                    playBtn.textContent = '▶';
                    playBtn.classList.add('paused');
                    isPlaying = false;
                    timeDisplay.innerHTML = '<span style="color:#ff8844;">⏹️ انتهى المقطع</span>';
                    return;
                }
                
                if (duration && duration > 0) {
                    timeDisplay.innerHTML = '<span class="highlight">' + formatTime(current) + '</span> / ' + formatTime(duration);
                }
            } catch(e) {}
        }
        
        function updateProgressBar() {
            if (!playerReady || !player || !player.getCurrentTime || isDragging) return;
            try {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                if (duration && duration > 0) {
                    const progress = Math.min((current / duration) * 100, 100);
                    progressBar.value = progress;
                    currentTimeLabel.textContent = formatTime(current);
                }
            } catch(e) {}
        }
        
        // --- إجراء آمن على المشغل ---
        function safePlayerAction(action) {
            if (!playerReady || !player) {
                console.warn('المشغل غير جاهز');
                return;
            }
            try {
                action();
            } catch(e) {
                console.error('خطأ:', e);
            }
        }
        
        // --- ربط الأزرار ---
        playBtn.addEventListener('click', function() {
            safePlayerAction(() => {
                if (isPlaying) {
                    player.pauseVideo();
                    this.textContent = '▶';
                    this.classList.add('paused');
                    isPlaying = false;
                } else {
                    if (endTime > 0 && player.getCurrentTime() >= endTime) {
                        player.seekTo(startTime || 0, true);
                    }
                    player.playVideo();
                    this.textContent = '⏸';
                    this.classList.remove('paused');
                    isPlaying = true;
                }
            });
        });
        
        rewindBtn.addEventListener('click', function() {
            safePlayerAction(() => {
                let newTime = player.getCurrentTime() - 10;
                if (newTime < (startTime || 0)) newTime = startTime || 0;
                player.seekTo(newTime, true);
            });
        });
        
        forwardBtn.addEventListener('click', function() {
            safePlayerAction(() => {
                let newTime = player.getCurrentTime() + 10;
                if (endTime > 0 && newTime > endTime) newTime = endTime - 0.5;
                player.seekTo(newTime, true);
            });
        });
        
        muteBtn.addEventListener('click', function() {
            safePlayerAction(() => {
                if (isMuted) {
                    player.unMute();
                    this.textContent = '🔊';
                    isMuted = false;
                    volumeSlider.value = volumeBeforeMute;
                    player.setVolume(volumeBeforeMute * 100);
                } else {
                    volumeBeforeMute = parseFloat(volumeSlider.value);
                    player.mute();
                    this.textContent = '🔇';
                    isMuted = true;
                    volumeSlider.value = 0;
                }
            });
        });
        
        volumeSlider.addEventListener('input', function() {
            safePlayerAction(() => {
                const volume = parseFloat(this.value);
                player.setVolume(volume * 100);
                if (volume === 0) {
                    muteBtn.textContent = '🔇';
                    isMuted = true;
                } else {
                    muteBtn.textContent = '🔊';
                    isMuted = false;
                    volumeBeforeMute = volume;
                }
            });
        });
        
        // شريط التقدم
        progressBar.addEventListener('mousedown', () => { isDragging = true; });
        progressBar.addEventListener('mouseup', function() {
            isDragging = false;
            safePlayerAction(() => {
                const value = parseFloat(this.value);
                const duration = player.getDuration();
                if (duration && duration > 0) {
                    let seekTime = (value / 100) * duration;
                    if (endTime > 0 && seekTime > endTime) seekTime = endTime - 0.5;
                    if (seekTime < (startTime || 0)) seekTime = startTime || 0;
                    player.seekTo(seekTime, true);
                }
            });
        });
        progressBar.addEventListener('input', function() {
            const duration = playerReady && player ? player.getDuration() : 0;
            if (duration && duration > 0) {
                const currentTime = (parseFloat(this.value) / 100) * duration;
                currentTimeLabel.textContent = formatTime(currentTime);
            }
        });
        
        // ملء الشاشة
        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                container.requestFullscreen?.() || container.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        });
        
        // اختصارات لوحة المفاتيح
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (!playerReady) return;
            switch(e.key) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    playBtn.click();
                    break;
                case 'ArrowRight':
                case 'l':
                    e.preventDefault();
                    forwardBtn.click();
                    break;
                case 'ArrowLeft':
                case 'j':
                    e.preventDefault();
                    rewindBtn.click();
                    break;
                case 'm':
                    muteBtn.click();
                    break;
                case 'f':
                    fullscreenBtn.click();
                    break;
            }
        });
        
        // إخفاء التحكم تلقائياً في وضع ملء الشاشة
        let controlsTimeout;
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.querySelector('.controls-main').style.opacity = '1';
                document.querySelector('.controls-bottom').style.opacity = '1';
            }
        });
        
        container.addEventListener('mousemove', function() {
            const mainControls = document.querySelector('.controls-main');
            const bottomControls = document.querySelector('.controls-bottom');
            mainControls.style.opacity = '1';
            bottomControls.style.opacity = '1';
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (isPlaying && !document.fullscreenElement) {
                    mainControls.style.opacity = '0.4';
                    bottomControls.style.opacity = '0.4';
                }
            }, 3000);
        });
        
        // --- بدء التشغيل ---
        console.log('🎵 مشغل الصوت الاحترافي');
        console.log('📹 الفيديو:', videoId);
        console.log('⏱️ البدء:', startTime, 'النهاية:', endTime);
        initPlayer();
    </script>

</body>
</html>
